<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roulette Game Factory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #6c5ce7;
            --primary-light: #8f7ff7;
            --primary-dark: #5b4cc4;
            --bg-dark: #121212;
            --bg-card: #1e1e1e;
            --bg-input: #2a2a2a;
            --border-color: #333333;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --success-color: #00b894;
            --error-color: #ff7675;
        }

        body {
            background: linear-gradient(135deg, var(--bg-dark) 0%, #1a1a2e 100%);
            color: var(--text-primary);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            padding: 3rem 1rem;
            max-width: 1000px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            margin-bottom: 1.5rem;
            border-radius: 16px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.3);
        }

        .card-body {
            padding: 2rem;
        }

        .card-title {
            color: var(--text-primary);
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            position: relative;
            padding-bottom: 0.5rem;
        }

        .card-title::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            height: 3px;
            width: 60px;
            background: linear-gradient(90deg, var(--primary-color), var(--primary-light));
            border-radius: 3px;
        }

        .form-label {
            color: var(--text-primary);
            font-weight: 500;
            margin-bottom: 0.75rem;
            font-size: 1rem;
        }

        .form-control {
            background: var(--bg-input);
            border: 2px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background: var(--bg-input);
            border-color: var(--primary-color);
            color: var(--text-primary);
            box-shadow: 0 0 0 4px rgba(108, 92, 231, 0.15);
        }

        .form-text {
            color: var(--text-secondary) !important;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            display: block;
        }

        .btn {
            border-radius: 12px;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(45deg, var(--primary-color), var(--primary-light));
            border: none;
            box-shadow: 0 4px 12px rgba(108, 92, 231, 0.3);
            white-space: nowrap;
        }

        .btn-primary:hover {
            background: linear-gradient(45deg, var(--primary-dark), var(--primary-color));
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(108, 92, 231, 0.4);
        }

        .btn-outline-primary {
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            background: transparent;
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
        }

        .btn-outline-primary:hover {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
        }

        .list-group-item {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 1rem;
            margin-bottom: 0.75rem;
            border-radius: 12px !important;
            transition: all 0.3s ease;
        }

        .list-group-item:hover {
            transform: translateX(4px);
            border-color: var(--primary-color);
        }

        #walletAddress {
            color: var(--primary-light);
            font-family: 'Consolas', monospace;
            background: var(--bg-input);
            padding: 0.75rem 1.25rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            display: inline-block;
            font-size: 0.9rem;
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            transition: all 0.3s ease;
            margin: 0;
        }

        #walletAddress:hover {
            border-color: var(--primary-color);
            background: rgba(108, 92, 231, 0.1);
        }

        #walletAddress:empty {
            display: none;
        }

        .page-title {
            font-size: 3rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 3rem;
            background: linear-gradient(45deg, var(--primary-light), #a8a4e6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            letter-spacing: -1px;
        }

        .mb-4 {
            margin-bottom: 2rem !important;
        }

        @media (max-width: 768px) {
            .container {
                padding: 2rem 1rem;
            }

            .card-body {
                padding: 1.5rem;
            }

            .page-title {
                font-size: 2.5rem;
                margin-bottom: 2rem;
            }
        }

        /* Loading animation for buttons */
        .btn.loading {
            position: relative;
            pointer-events: none;
            opacity: 0.8;
        }

        .btn.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            right: 1rem;
            margin-top: -10px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Success animation */
        .success-animation {
            animation: successPulse 0.5s ease-out;
        }

        @keyframes successPulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }

            100% {
                transform: scale(1);
            }
        }

        .gap-3 {
            gap: 1rem !important;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.2.0/ethers.umd.min.js"
        type="application/javascript"></script>
    <script src="js/factory.js" type="module"></script>
    </body>
</head>

<body>
    <div class="container">
        <h1 class="page-title">Roulette Game Factory</h1>

        <div class="row mb-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Wallet Connection</h5>
                        <div class="d-flex align-items-center flex-wrap gap-3">
                            <button id="connectWallet" class="btn btn-primary">Connect Wallet</button>
                            <span id="walletAddress"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Create New Roulette Game</h5>
                        <form id="createContractForm">
                            <div class="mb-3">
                                <label for="host" class="form-label">Host Address</label>
                                <input type="text" class="form-control" id="host" placeholder="0x..." required>
                                <small class="form-text">The address that will host the game (defaults to your wallet address if empty)</small>
                            </div>
                            <div class="mb-3">
                                <label for="minBet" class="form-label">Minimum Bet (ETH)</label>
                                <input type="number" class="form-control" id="minBet" step="0.001" min="0.001" required>
                            </div>
                            <div class="mb-3">
                                <label for="minDeposit" class="form-label">Minimum Deposit (ETH)</label>
                                <input type="number" class="form-control" id="minDeposit" step="0.001" min="0.001"
                                    required>
                            </div>
                            <div class="mb-3">
                                <label for="validators" class="form-label">Validator Addresses</label>
                                <input type="text" class="form-control" id="validators" placeholder="0x123...,0x456..."
                                    required>
                                <small class="form-text">Enter Ethereum addresses separated by commas</small>
                            </div>
                            <div class="mb-3">
                                <label for="validThreshold" class="form-label">Validator Threshold</label>
                                <input type="number" class="form-control" id="validThreshold" min="1" max="255"
                                    required>
                                <small class="form-text">Number of validators required for consensus (1-255)</small>
                            </div>
                            <button type="submit" class="btn btn-primary">Create Contract</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Available Contracts</h5>
                        <div id="contractsList" class="list-group">
                            <!-- Contracts will be listed here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>



</html>
